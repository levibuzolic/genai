<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Media Library</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <h1>Media Library</h1>
        <p id="configLine">Loading local library...</p>
      </div>
      <div class="actions">
        <button id="syncNewButton" type="button">Sync & download</button>
        <details class="actionMenu">
          <summary>More</summary>
          <div class="actionMenuPanel">
            <button id="syncAllButton" type="button" class="secondary">Full rescan</button>
            <button id="downloadMissingButton" type="button" class="secondary">Download missing</button>
            <button id="retryErrorsButton" type="button" class="secondary">Retry errors</button>
            <button id="generateThumbnailsButton" type="button" class="secondary">Thumbnails</button>
            <button id="verifyLibraryButton" type="button" class="secondary">Verify</button>
          </div>
        </details>
        <button id="cancelSyncButton" type="button" class="secondary" hidden>Cancel</button>
      </div>
    </header>

    <main>
      <section class="toolbar" aria-label="Library filters">
        <label class="search">
          <span>Search</span>
          <input id="searchInput" type="search" placeholder="Prompt, ID, type">
        </label>
        <label class="mediaFilter">
          <span>Media</span>
          <select id="mediaSelect">
            <option value="all">All</option>
            <option value="image">Images</option>
            <option value="video">Videos</option>
          </select>
        </label>
        <label class="statusFilter">
          <span>Status</span>
          <select id="statusSelect">
            <option value="all">All statuses</option>
            <option value="downloaded">Downloaded</option>
            <option value="missing">Missing local file</option>
            <option value="error">Errors</option>
            <option value="duplicate">Duplicates</option>
            <option value="unverified">Unverified</option>
            <option value="favorited">Favorited</option>
          </select>
        </label>
        <label class="sortFilter">
          <span>Sort</span>
          <select id="sortSelect">
            <option value="newest">Newest</option>
            <option value="oldest">Oldest</option>
            <option value="largest">Largest</option>
            <option value="smallest">Smallest</option>
          </select>
        </label>
        <label class="pageSizeFilter">
          <span>Page size</span>
          <select id="pageSizeSelect">
            <option value="48">48</option>
            <option value="96">96</option>
            <option value="180">180</option>
          </select>
        </label>
        <div class="viewToggle" aria-label="View mode">
          <button id="gridViewButton" type="button" class="toggleButton is-active">Grid</button>
          <button id="listViewButton" type="button" class="toggleButton">List</button>
        </div>
        <button id="clearFiltersButton" type="button" class="secondary">Clear filters</button>
      </section>

      <section id="summaryCards" class="summary" aria-label="Collection summary"></section>
      <section id="activeFilters" class="chips" aria-label="Active filters" hidden></section>

      <section class="status" aria-live="polite">
        <div id="syncStatus">Idle.</div>
        <div id="libraryStatus"></div>
      </section>

      <section class="pager" aria-label="Library pages">
        <button id="prevPageButton" type="button" class="secondary">Previous</button>
        <span id="pageStatus">Page 1 of 1</span>
        <button id="nextPageButton" type="button" class="secondary">Next</button>
      </section>

      <section id="grid" class="grid" aria-label="Downloaded media" data-view="grid"></section>
      <section id="emptyState" class="empty" hidden>
        <h2>No media downloaded yet</h2>
        <p>Run a sync to download files into the local media directory.</p>
      </section>

      <details class="catalogTools">
        <summary>
          <strong>Catalog backups</strong>
          <span id="backupStatus">Loading backups...</span>
        </summary>
        <div class="catalogActions">
          <a id="exportCatalogLink" class="buttonLink" href="/api/catalog/export" download>Export catalog</a>
          <button id="createBackupButton" type="button" class="secondary">Create backup</button>
          <select id="backupSelect" aria-label="Catalog backup"></select>
          <button id="restoreBackupButton" type="button" class="secondary">Restore backup</button>
        </div>
      </details>
    </main>

    <template id="itemTemplate">
      <article class="card">
        <a class="previewLink" target="_blank" rel="noreferrer">
          <div class="preview"></div>
        </a>
        <div class="cardBody">
          <div class="cardMeta"></div>
          <p class="prompt"></p>
          <div class="cardFooter">
            <div class="cardActions">
              <button class="detailsButton" type="button">Details</button>
              <button class="copyPromptButton" type="button" title="Copy prompt">Prompt</button>
              <a class="openLink" target="_blank" rel="noreferrer">Open</a>
            </div>
          </div>
        </div>
      </article>
    </template>

    <dialog id="itemDialog" class="detailDialog">
      <form method="dialog" class="dialogHeader">
        <div>
          <h2 id="detailTitle">Media details</h2>
          <p id="detailMeta"></p>
        </div>
        <button type="submit" class="secondary">Close</button>
      </form>
      <div class="dialogBody">
        <div id="detailPreview" class="detailPreview"></div>
        <div class="detailPanel">
          <section>
            <h3>Prompt</h3>
            <p id="detailPrompt" class="detailText"></p>
          </section>
          <section id="negativePromptSection" hidden>
            <h3>Negative prompt</h3>
            <p id="detailNegativePrompt" class="detailText"></p>
          </section>
          <dl id="detailFacts" class="detailFacts"></dl>
          <div class="dialogActions">
            <button id="detailCopyPromptButton" type="button">Copy prompt</button>
            <button id="detailCopyIdButton" type="button" class="secondary">Copy ID</button>
            <button id="detailCopyUrlButton" type="button" class="secondary">Copy output URL</button>
            <a id="detailOpenLink" class="openLink" target="_blank" rel="noreferrer">Open media</a>
          </div>
        </div>
      </div>
    </dialog>

    <script src="/app.js" type="module"></script>
  </body>
</html>
